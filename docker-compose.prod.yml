version: '3.9'

services:
  migrate:
    build:
      context: .
      target: builder
    container_name: wallet_migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx ts-node prisma/seed.ts
      "

  app:
    build:
      context: .
      target: production
    container_name: wallet_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    depends_on:
      migrate:
        condition: service_completed_successfully